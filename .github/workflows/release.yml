name: Release CLI

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build binaries
        run: |
          bun build --compile src/index.ts --outfile npm/releases-darwin-arm64/releases --target=bun-darwin-arm64
          bun build --compile src/index.ts --outfile npm/releases-darwin-x64/releases --target=bun-darwin-x64
          bun build --compile src/index.ts --outfile npm/releases-linux-x64/releases --target=bun-linux-x64
          bun build --compile src/index.ts --outfile npm/releases-linux-arm64/releases --target=bun-linux-arm64
          bun build --compile src/index.ts --outfile npm/releases-windows-x64/releases.exe --target=bun-windows-x64

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_PUBLISHING_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: bun run changeset:version
          publish: bun run changeset:publish
          commit: "chore: version packages"
          title: "chore: version packages"
          # The consolidated `v*` release (created below) carries the
          # platform binaries and the real change notes. Per-package
          # releases are pure noise.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_PUBLISHING_TOKEN }}

      - name: Prepare release assets
        if: steps.changesets.outputs.published == 'true'
        run: |
          mkdir -p dist/release
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            cp "npm/releases-${target}/releases" "dist/release/releases-${target}"
            gzip -k "dist/release/releases-${target}"
            sha256sum "dist/release/releases-${target}.gz" | awk '{print $1}' > "dist/release/releases-${target}.gz.sha256"
          done
          # Windows ships the .exe inside a .zip (the conventional Windows
          # archive format) rather than a single-binary .gz like the others.
          cp "npm/releases-windows-x64/releases.exe" "dist/release/releases-windows-x64.exe"
          (cd dist/release && zip -q "releases-windows-x64.zip" "releases-windows-x64.exe")
          sha256sum "dist/release/releases-windows-x64.zip" | awk '{print $1}' > "dist/release/releases-windows-x64.zip.sha256"
          sha256sum dist/release/*.gz dist/release/*.zip > dist/release/checksums.txt

      - name: Publish binaries to GitHub Releases
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r .version npm/releases/package.json)

          # Extract the current version's section from the meta package's
          # CHANGELOG (generated by `changeset version`) so the consolidated
          # v* release carries the real change notes. Falls back to a short
          # note if extraction came up empty (shouldn't happen in practice).
          NOTES=$(awk -v v="## ${VERSION}" '
            $0 == v { found=1; next }
            found && /^## / { exit }
            found { print }
          ' npm/releases/CHANGELOG.md)

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "${NOTES:-CLI v${VERSION}. Install via brew or npm.}" \
            dist/release/releases-darwin-arm64.gz \
            dist/release/releases-darwin-arm64.gz.sha256 \
            dist/release/releases-darwin-x64.gz \
            dist/release/releases-darwin-x64.gz.sha256 \
            dist/release/releases-linux-x64.gz \
            dist/release/releases-linux-x64.gz.sha256 \
            dist/release/releases-linux-arm64.gz \
            dist/release/releases-linux-arm64.gz.sha256 \
            dist/release/releases-windows-x64.zip \
            dist/release/releases-windows-x64.zip.sha256 \
            dist/release/checksums.txt

      - name: Update Homebrew tap
        # Pushes an updated Formula/releases.rb to the buildinternet/homebrew-tap repo.
        # Requires TAP_PUBLISH_TOKEN secret (fine-grained PAT with write access to
        # buildinternet/homebrew-tap). The download URLs below point to this repo's
        # releases — adjust if the tap's formula points elsewhere.
        if: steps.changesets.outputs.published == 'true'
        env:
          TAP_TOKEN: ${{ secrets.TAP_PUBLISH_TOKEN }}
        run: |
          VERSION=$(jq -r .version npm/releases/package.json)
          DARWIN_ARM64=$(cat dist/release/releases-darwin-arm64.gz.sha256)
          DARWIN_X64=$(cat dist/release/releases-darwin-x64.gz.sha256)
          LINUX_ARM64=$(cat dist/release/releases-linux-arm64.gz.sha256)
          LINUX_X64=$(cat dist/release/releases-linux-x64.gz.sha256)

          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/buildinternet/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/releases.rb <<'FORMULA'
          class Releases < Formula
            desc "Changelog indexer and registry for AI agents and developers"
            homepage "https://releases.sh"
            version "__VERSION__"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/buildinternet/releases-cli/releases/download/v#{version}/releases-darwin-arm64.gz"
                sha256 "__DARWIN_ARM64__"
              else
                url "https://github.com/buildinternet/releases-cli/releases/download/v#{version}/releases-darwin-x64.gz"
                sha256 "__DARWIN_X64__"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/buildinternet/releases-cli/releases/download/v#{version}/releases-linux-arm64.gz"
                sha256 "__LINUX_ARM64__"
              else
                url "https://github.com/buildinternet/releases-cli/releases/download/v#{version}/releases-linux-x64.gz"
                sha256 "__LINUX_X64__"
              end
            end

            def install
              # Single-binary .gz decompresses to a platform-suffixed filename
              # (e.g. releases-darwin-arm64). Rename to "releases" on install.
              binary = Dir["releases-*"].find { |f| File.file?(f) }
              bin.install binary => "releases"
            end

            test do
              assert_match "releases", shell_output("#{bin}/releases --version")
            end
          end
          FORMULA

          sed -i 's/^          //' tap/Formula/releases.rb
          sed -i "s|__VERSION__|${VERSION}|" tap/Formula/releases.rb
          sed -i "s|__DARWIN_ARM64__|${DARWIN_ARM64}|" tap/Formula/releases.rb
          sed -i "s|__DARWIN_X64__|${DARWIN_X64}|" tap/Formula/releases.rb
          sed -i "s|__LINUX_ARM64__|${LINUX_ARM64}|" tap/Formula/releases.rb
          sed -i "s|__LINUX_X64__|${LINUX_X64}|" tap/Formula/releases.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/releases.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged — skipping push"
          else
            git commit -m "chore: release v${VERSION}"
            git push origin HEAD:main
          fi
