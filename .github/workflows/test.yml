name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Matches the release workflow pin; see release.yml for context.
          bun-version: canary

      - run: bun install --frozen-lockfile

      # Catches workspace-topology drift (new/renamed/removed packages under
      # npm/* or packages/*) and version-metadata drift across releases.
      # `--frozen-lockfile` only enforces the dependency graph; a fresh install
      # rewrites the workspaces section, and any diff means bun.lock wasn't
      # committed alongside the change that produced it.
      - name: Verify lockfile is up to date
        run: |
          bun install
          git diff --exit-code bun.lock

      - name: Oxlint
        run: bun run lint

      - name: Prettier
        run: bun run format:check

  test:
    name: Type-check and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Matches the release workflow pin; see release.yml for context.
          bun-version: canary

      - run: bun install --frozen-lockfile

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: bun test

  smoke-windows:
    name: Windows binary smoke test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: canary

      - run: bun install --frozen-lockfile

      # Native compile on Windows — proves the same artifact published via npm
      # actually starts on a Windows host. Cross-compile from Linux is what
      # release.yml ships; this catches Bun-on-Windows runtime regressions.
      - name: Compile for Windows
        run: bun build --compile src/index.ts --outfile dist/releases.exe

      - name: Run --version
        shell: bash
        run: ./dist/releases.exe --version
